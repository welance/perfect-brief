name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: lint
        run: ruff check .
      - name: types
        run: mypy app perfect_brief
      - name: fixture corpus + api (mock judge, deterministic)
        run: pytest
