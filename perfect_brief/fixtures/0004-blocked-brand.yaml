id: 0004-blocked-brand
input_type: brief
input: >
  # Real-time availability for independent restaurant bookings

  Problem: small restaurants lose bookings because staff can't update
  availability in real time. Primary users: shift managers. Success: reduce
  no-shows by 30% within two seasons. Deliverables: an auth login with sessions
  and an availability API endpoint. Out of scope: native apps. Budget band
  25-40k. Ship before the spring season. Needs a full-stack developer and a
  designer. Integrates with our Stripe account; contact mara.rossi@acme.it.
  Risk: low adoption, we validate first. Stores customer booking history; GDPR
  lawful basis is contract. The public booking page targets WCAG 2.2 AA.
expected: {min: 85, max: 100}
expected_decision: blocked
expected_verdicts:
  anonymised: fail
notes: High quality (would be Directory-ready) but leaks a brand and an email — blocked until anonymised.
